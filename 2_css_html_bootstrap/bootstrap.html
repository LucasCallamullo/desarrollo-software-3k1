<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
    
    <!-- Local stylesheet (commented out, currently not in use) -->
    <!-- 
    <link rel="stylesheet" href="../styles.css">
    -->
    
    <!-- Custom inline styles -->
    <style>
        /* Modal image styling - scales image to fit width while maintaining aspect ratio */
        .img-fernet {
            width: 100%;
            height: 200px;
            object-fit: scale-down;
        }

        /* Carousel container height and width constraints */
        .carousel-inner {
            height: 400px;
            width: 100%;
        }
    </style>
  </head>
  <body>
    <!-- Page heading -->
    <h1>Hello, world!</h1>

    <!-- BOOTSTRAP CAROUSEL SECTION -->
    <!-- Image slider with previous/next navigation controls -->
    <div id="carouselExample" class="carousel slide">
        <!-- Carousel inner container with individual slides -->
        <div class="carousel-inner">
            <!-- First slide (active/visible by default) -->
            <div class="carousel-item active">
                <img src="https://i.pinimg.com/1200x/4b/5c/70/4b5c7078ee3497f8ee1bc68e78bf6be8.jpg" class="d-block w-100" alt="...">
            </div>
            <!-- Second slide -->
            <div class="carousel-item">
                <img src="https://i.pinimg.com/736x/d3/ad/b4/d3adb416409a2581f9e884af09054e04.jpg" class="d-block w-100" alt="...">
            </div>
            <!-- Third slide -->
            <div class="carousel-item">
                <img src="https://i.pinimg.com/736x/a3/fd/b3/a3fdb33f0c69efed845e3ff0bd0296af.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
        
        <!-- Previous slide control button -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        
        <!-- Next slide control button -->
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- MODAL SECTION -->
    <!-- Button trigger for Bootstrap modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Launch demo modal
    </button>

    <!-- Bootstrap Modal component -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <!-- Modal header with title and close button -->
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Donenme un fernet</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <!-- Modal body content (image) -->
                <div class="modal-body">
                    <img src="https://i.pinimg.com/1200x/4b/5c/70/4b5c7078ee3497f8ee1bc68e78bf6be8.jpg" 
                        alt="fernetcito" class="img-fernet">
                </div>
                
                <!-- Modal footer with action buttons -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JavaScript bundle (includes Popper) - placed at bottom for better performance -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>
  </body>
</html>
